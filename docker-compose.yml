version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql_database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-senha_root_padrao}
      MYSQL_DATABASE: ${DB_NAME:-meu_banco}
      MYSQL_USER: ${DB_USER:-meu_usuario}
      MYSQL_PASSWORD: ${DB_PASSWORD:-senha_secreta}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  app-backend:
    build: .
    container_name: app_backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mysql-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/${DB_NAME:-meu_banco}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-meu_usuario}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-senha_secreta}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network: